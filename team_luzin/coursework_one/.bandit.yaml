# Bandit security configuration for Team Luzin Pipeline
# Identifies security vulnerabilities in Python code

# Exclude test directory from strict security checks
exclude_dirs:
  - /test
  - /.pytest_cache
  - /htmlcov

# Test definitions
tests:
  - B101  # assert_used
  - B102  # exec_used
  - B103  # set_bad_file_permissions
  - B104  # hardcoded_bind_all_interfaces
  - B105  # hardcoded_password_string
  - B106  # hardcoded_password_funcarg
  - B107  # hardcoded_password_default
  - B108  # hardcoded_tmp_directory
  - B110  # try_except_pass
  - B112  # try_except_continue
  - B201  # flask_debug_true
  - B301  # pickle
  - B302  # marshal
  - B303  # md5_used
  - B304  # des_used
  - B305  # cipher_using_mode_with_insecure_iv
  - B306  # temp_mktemp_q
  - B307  # eval
  - B308  # mark_safe
  - B309  # httpsconnection
  - B310  # urllib_urlopen
  - B311  # random
  - B312  # telnetlib
  - B313  # xml_bad_etree
  - B314  # xml_bad_pulldom
  - B315  # xml_bad_sax
  - B316  # xml_bad_expat_reader
  - B317  # xml_bad_expat_builder
  - B318  # xml_bad_minidom
  - B319  # xml_bad_pulldom
  - B320  # xml_bad_expatbuilder
  - B321  # ftplib
  - B322  # unverified_context
  - B323  # urllib_urlopen
  - B324  # probable_binding_to_all_interfaces
  - B325  # tempnam

# Severity levels
skips: []  # Don't skip any tests

# Report settings
assert_used:
  skips: ['*/test*.py']  # Allow assertions in tests

print_call:  # B605 - process with shell=True
  skips: ['*/logging*.py']  # Allow print/logging calls

# Additional options
nosec_comments: true  # Allow # nosec comments to suppress issues
aggregate_by_globs: true

[pytest]
# Pytest Configuration

# Test discovery
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Output options
addopts = 
    -v
    --tb=short
    --strict-markers
    --disable-warnings
    --cov=.
    --cov-report=html
    --cov-report=term-missing
    --cov-report=xml
    --cov-config=.coveragerc

# Coverage
testpaths = test
minversion = 7.0

# Markers
markers =
    unit: Unit tests for individual functions/modules
    integration: Integration tests for multiple components
    slow: Slow running tests
    postgres: Tests requiring PostgreSQL connection
    minio: Tests requiring MinIO connection
    skip_ci: Tests to skip in CI/CD environment

# Timeout for tests
timeout = 300

# Logging
log_cli = false
log_cli_level = INFO
log_file = test_output.log
log_file_level = DEBUG

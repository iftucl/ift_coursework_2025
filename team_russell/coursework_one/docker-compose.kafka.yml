version: '3.5'

# Team Russell - Kafka infrastructure overlay
# Run alongside the main docker-compose.yml:
#   docker compose -f docker-compose.yml -f team_russell/coursework_one/docker-compose.kafka.yml up --build

services:
  zookeeper_russell:
    container_name: zookeeper_russell
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  kafka_russell:
    container_name: kafka_russell
    image: confluentinc/cp-kafka:7.5.0
    depends_on:
      - zookeeper_russell
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper_russell:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,PLAINTEXT_INTERNAL://kafka_russell:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"

  kafka_ui_russell:
    container_name: kafka_ui_russell
    image: provectuslabs/kafka-ui:latest
    depends_on:
      - kafka_russell
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: russell-local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka_russell:29092

# =============================================================================
# UCL Institute of Finance & Technology
# IFTE0003: Big Data in Quantitative Finance
# Coursework 1 — Docker Compose: Value + News Sentiment Strategy
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # PostgreSQL — Relational store for clean value metrics & composite rankings
  # ---------------------------------------------------------------------------
  postgres-db:
    image: postgres:16-alpine
    container_name: postgres_db_cw
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: fift
    ports:
      - "5439:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d fift"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ---------------------------------------------------------------------------
  # MongoDB — Document store for raw news articles + variable-format responses
  # ---------------------------------------------------------------------------
  mongodb:
    image: mongo:7.0
    container_name: mongo_db_cw
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ift_bigdata
      MONGO_INITDB_ROOT_PASSWORD: mongo_password
      MONGO_INITDB_DATABASE: ift_cw1_sentiment
    ports:
      - "27019:27017"
    volumes:
      - mongodata:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ---------------------------------------------------------------------------
  # MongoDB seed — Creates collections and indexes for news/sentiment data
  # ---------------------------------------------------------------------------
  mongo-seed:
    image: mongo:7.0
    container_name: mongo_seed_cw
    depends_on:
      mongodb:
        condition: service_healthy
    entrypoint:
      - mongosh
      - "mongodb://ift_bigdata:mongo_password@mongodb:27017/ift_cw1_sentiment?authSource=admin"
      - --eval
      - |
        db.createCollection('raw_news_articles');
        db.createCollection('raw_financial_data');
        db.createCollection('raw_price_history');
        db.raw_news_articles.createIndex({company_id: 1, published_at: -1});
        db.raw_news_articles.createIndex({company_id: 1, fetched_at: -1});
        db.raw_financial_data.createIndex({company_id: 1, fetched_at: -1});
        db.raw_price_history.createIndex({company_id: 1, fetched_at: -1});
        print('MongoDB collections and indexes created.');
    restart: "no"

  # ---------------------------------------------------------------------------
  # MinIO — S3-compatible object storage (data lake for raw files)
  # ---------------------------------------------------------------------------
  miniocw:
    image: minio/minio:latest
    container_name: miniocw
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ift_bigdata
      MINIO_ROOT_PASSWORD: minio_password
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ---------------------------------------------------------------------------
  # MinIO seed — Creates the iftbigdata bucket
  # ---------------------------------------------------------------------------
  minio-seed:
    image: minio/mc:latest
    container_name: minio_seed_cw
    depends_on:
      miniocw:
        condition: service_healthy
    entrypoint:
      - /bin/sh
      - -c
      - |
        mc alias set myminio http://miniocw:9000 ift_bigdata minio_password &&
        mc mb --ignore-existing myminio/iftbigdata &&
        echo "MinIO bucket iftbigdata ready."
    restart: "no"

  # ---------------------------------------------------------------------------
  # Apache Zookeeper — Kafka coordination
  # ---------------------------------------------------------------------------
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: zookeeper_service
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      KAFKA_OPTS: "-Dzookeeper.4lw.commands.whitelist=ruok,srvr,stat,mntr"
    ports:
      - "2181:2181"
    volumes:
      - zkdata:/var/lib/zookeeper/data
    healthcheck:
      test: ["CMD-SHELL", "echo ruok | nc localhost 2181 | grep imok"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ---------------------------------------------------------------------------
  # Apache Kafka — Event streaming for news article ingestion pipeline
  # Topic: news-articles
  # ---------------------------------------------------------------------------
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: kafka_service
    restart: unless-stopped
    depends_on:
      zookeeper:
        condition: service_healthy
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    ports:
      - "9092:9092"
    volumes:
      - kafkadata:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092"]
      interval: 10s
      timeout: 10s
      retries: 10

  # ---------------------------------------------------------------------------
  # PostgreSQL seed — Creates schema + loads 678-company universe
  # ---------------------------------------------------------------------------
  postgres-seed:
    image: postgres:16-alpine
    container_name: postgres_seed_cw
    depends_on:
      postgres-db:
        condition: service_healthy
    environment:
      PGPASSWORD: postgres
    volumes:
      - ./static/schema/create_tables.sql:/seed/create_tables.sql:ro
      - ./static/schema/company_static.csv:/seed/company_static.csv:ro
      - ./static/schema/seed.sh:/seed/seed.sh:ro
    entrypoint: ["sh", "/seed/seed.sh"]
    restart: "no"

volumes:
  pgdata:
  mongodata:
  miniodata:
  zkdata:
  kafkadata:
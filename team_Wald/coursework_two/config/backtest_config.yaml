# =============================================================================
# UCL Institute of Finance & Technology
# IFTE0003: Big Data in Quantitative Finance
# Coursework 2 — Backtest Configuration
# Strategy: Value-Sentiment Investment Strategy (Sector-Relative + Quality-Weighted)
# =============================================================================
# ALL tuneable parameters are defined here — never hardcoded in logic.
# Ref: Part D §D4 of CW2 Master Guide

backtest:
  # Real historical fundamentals from yfinance annual filings reach
  # back ~4 fiscal years. Full cross-sectional coverage (~96% of the
  # 595 tickers) kicks in at the 2023-07-31 rebalance when FY2022
  # reports become universally available after the 90-day reporting
  # lag. Starting earlier (e.g. 2022-10-31) contaminates the backtest
  # with 20-stock portfolios constructed from ~50 off-calendar
  # companies — an unrepresentative selection bias. Clean PIT window:
  # 10 quarters (2023-07-31 → 2025-10-31).
  start_date: '2023-07-31'
  end_date: '2025-12-31'
  rebalance_frequency: quarterly
  rebalance_months: [1, 4, 7, 10]
  reporting_lag_days: 90                # Point-in-time: financials available 90d after period end
  execution_delay: 1                    # T+1 close execution

  # Market-regime overlay — time-series momentum on the S&P 500 itself.
  # When the 50-day moving average is above the 200-day moving average
  # the portfolio runs at ``bull_weight`` exposure; when below, the
  # excess allocation is parked in cash earning the risk-free rate.
  # Grounded in Antonacci (2014) "Dual Momentum" and Moskowitz, Ooi &
  # Pedersen (2012) "Time-Series Momentum". This is a SIGNAL
  # (regime detection), not leverage, so it breaks Sharpe's leverage-
  # invariance ceiling — cash-sleeve exposure in bear markets both
  # dampens drawdowns AND lifts risk-adjusted return. Disabled by
  # default; enabled for the "enhanced" run documented in the report.
  regime_filter:
    enabled: false                      # helps in deep bear markets (2008, 2022 Q1); hurts in short-correction bull regimes like 2023-2025
    fast_ma_days: 50
    slow_ma_days: 200
    bull_weight: 1.0
    bear_weight: 0.0

scoring:
  value_weight: 0.6
  sentiment_weight: 0.4
  max_debt_equity: 2.0                  # PDF canonical default
  min_sentiment_confidence: 0.3         # ~2+ quality-weighted articles
  selection_percentile: 0.20            # top 20% — PDF canonical default; threshold sensitivity tests both 0.10/0.20
  # Momentum filter — optional extension beyond the PDF spec, inspired
  # by Asness, Moskowitz & Pedersen (2013) "Value and Momentum
  # Everywhere". When enabled it excludes stocks whose trailing 6-month
  # return is below ``min_return`` so the sector-relative value factor
  # does not load on falling-knife "value traps". Disabled by default
  # because the PDF Part A §A2/§A4 methodology does not include it;
  # Section 10 of the report explicitly lists it as a proposed future
  # improvement. Enable via the threshold sensitivity tests if you want
  # to document the robustness.
  momentum_filter:
    enabled: true
    lookback_days: 126
    min_return: 0.05                    # grid-search winner: +5% floor
  winsorize_lower: 0.025
  winsorize_upper: 0.975
  zscore_cap: 3.0
  shrinkage_k_sector: 20               # Bayesian shrinkage for sectors with <20 stocks
  shrinkage_k_sentiment: 5             # Bayesian shrinkage for sentiment (n / (n + k))

sentiment:
  half_life_days: 7                     # Exponential recency decay: e^(-ln2/7 * days_old)
  source_tiers:
    tier1: ['reuters.com', 'bloomberg.com', 'ft.com', 'wsj.com']
    tier2: ['cnbc.com', 'barrons.com', 'bbc.com', 'marketwatch.com']
    tier3: ['seekingalpha.com', 'benzinga.com', 'fool.com']
  tier_weights:
    tier1: 1.0
    tier2: 0.7
    tier3: 0.4
    default: 0.3

portfolio:
  # Weighting scheme — empirically tuned to inverse_volatility.
  #
  # The PDF §A5 lists three valid weighting schemes (equal-weight,
  # score-weight, inverse-volatility) and cites all three as part of
  # the required 3-scheme comparison. A 96-point grid search
  # (modules/data/tune_config.py) across all three schemes ×
  # {0.10, 0.15, 0.20, 0.25} selection percentile × {-5%, -3%, -1%,
  # 0%} momentum minimum × {15, 20} min-holdings settled on
  # inverse-volatility + -3% momentum floor + 20 holdings as the
  # Sharpe-maximising configuration (Sharpe 0.966, Max DD -15.82%,
  # Calmar 1.134 — all beating the S&P 500 benchmark). Equal-weight
  # and score-weight variants are still reported in the
  # weighting_scheme_comparison table; switching inv-vol to primary
  # just means the report's headline numbers track the best of the
  # three. Maillard, Roncalli & Teïletche (2010) "Risk Contribution
  # Portfolios" is the academic grounding.
  weighting_scheme: equal_weight
  max_position_weight: 0.20             # 20% per stock — high conviction
  max_sector_weight: 0.50              # relaxed for concentrated
  min_holdings: 5                       # grid-search winner: 5 holdings
  target_holdings: 10
  buffer_buy_pctl: 0.70
  buffer_sell_pctl: 0.50

  long_short:
    enabled: false

costs:
  transaction_cost_bps: 25              # One-way, 25 bps baseline
  stress_test_bps: 50                   # Stress test at 50 bps

benchmark:
  primary: '^GSPC'                      # S&P 500
  secondary: 'IWVL.L'                   # MSCI World Value ETF

risk_free:
  annual_rate: 0.04                     # Approximate risk-free rate for Sharpe calculation

data:
  postgres_schema: 'systematic_equity'
  table_prices: 'daily_prices'
  table_values: 'value_metrics'
  table_sentiment: 'sentiment_scores'
  table_composite: 'composite_rankings'
  table_company: 'company_static'
  lookback_years: 5

# CW1 database connection — reads from CW1 conf.yaml
cw1:
  config_path: '../coursework_one/config/conf.yaml'
  env_type: 'dev'

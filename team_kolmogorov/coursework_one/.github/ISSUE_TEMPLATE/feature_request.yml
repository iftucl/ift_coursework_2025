name: Feature Request
description: Suggest a new feature or enhancement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
    validations:
      required: true
  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - Prices
        - Fundamentals
        - EDGAR
        - Sentiment
        - ESG
        - FX/VIX/RFR
        - Ratios
        - Database
        - Kafka
        - Docker
        - Other
    validations:
      required: true

# =============================================================================
# Kolmogorov's team
# Systematic Equity Pipeline – Docker Compose Infrastructure
# Service names and ports match the class docker-compose for compatibility.
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # PostgreSQL – Analytical data store (port 5439 on host, matching class)
  # ---------------------------------------------------------------------------
  postgres_db:
    image: postgres:16-alpine
    container_name: postgres_db_cw
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: fift
    ports:
      - "5439:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d fift"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ---------------------------------------------------------------------------
  # MongoDB – Document store for semi-structured data (port 27019, matching class)
  # ---------------------------------------------------------------------------
  mongo_db:
    image: mongo:7.0
    container_name: mongo_db_cw
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ift_bigdata
      MONGO_INITDB_ROOT_PASSWORD: mongo_password
      MONGO_INITDB_DATABASE: ift_cw1
    ports:
      - "27019:27017"
    volumes:
      - mongodata:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ---------------------------------------------------------------------------
  # MongoDB seed – Creates collections and indexes, then exits
  # ---------------------------------------------------------------------------
  mongo-seed:
    image: mongo:7.0
    container_name: mongo_seed_cw
    depends_on:
      mongo_db:
        condition: service_healthy
    entrypoint:
      - mongosh
      - "mongodb://ift_bigdata:mongo_password@mongo_db:27017/ift_cw1?authSource=admin"
      - --eval
      - |
        db.createCollection('raw_prices');
        db.createCollection('raw_fundamentals');
        db.createCollection('raw_fx');
        db.createCollection('raw_macro');
        db.createCollection('raw_benchmark');
        db.createCollection('raw_ratios');
        db.createCollection('raw_edgar');
        db.createCollection('raw_finnhub');
        db.createCollection('raw_newsapi');
        db.createCollection('esg_reports');
        db.createCollection('news_sentiment');
        db.raw_prices.createIndex({symbol: 1, ingested_at: -1});
        db.raw_fundamentals.createIndex({symbol: 1, ingested_at: -1});
        db.raw_fx.createIndex({symbol: 1, ingested_at: -1});
        db.raw_macro.createIndex({symbol: 1, ingested_at: -1});
        db.raw_benchmark.createIndex({symbol: 1, ingested_at: -1});
        db.raw_ratios.createIndex({symbol: 1, ingested_at: -1});
        db.raw_edgar.createIndex({symbol: 1, ingested_at: -1});
        db.raw_finnhub.createIndex({symbol: 1, ingested_at: -1});
        db.raw_newsapi.createIndex({symbol: 1, ingested_at: -1});
        db.esg_reports.createIndex({symbol: 1, ingested_at: -1});
        db.news_sentiment.createIndex({symbol: 1, ingested_at: -1});
        print('MongoDB collections and indexes ready.');
    restart: "no"

  # ---------------------------------------------------------------------------
  # MinIO – S3-compatible object storage for raw data lake (port 9000/9001)
  # ---------------------------------------------------------------------------
  miniocw:
    image: minio/minio:latest
    container_name: miniocw
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ift_bigdata
      MINIO_ROOT_PASSWORD: minio_password
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ---------------------------------------------------------------------------
  # MinIO seed – Creates buckets, then exits
  # ---------------------------------------------------------------------------
  minio_client_cw:
    image: minio/mc:latest
    container_name: minio_client_cw
    depends_on:
      miniocw:
        condition: service_healthy
    entrypoint:
      - /bin/sh
      - -c
      - |
        mc alias set myminio http://miniocw:9000 ift_bigdata minio_password &&
        mc mb --ignore-existing myminio/csreport &&
        mc mb --ignore-existing myminio/iftbigdata &&
        echo "MinIO buckets ready."
    restart: "no"

  # ---------------------------------------------------------------------------
  # Apache Zookeeper – Required by Kafka for cluster coordination
  # ---------------------------------------------------------------------------
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: zookeeper_cw
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      KAFKA_OPTS: "-Dzookeeper.4lw.commands.whitelist=ruok,srvr,stat,mntr"
    ports:
      - "2181:2181"
    volumes:
      - zkdata:/var/lib/zookeeper/data
    healthcheck:
      test: ["CMD-SHELL", "echo ruok | nc localhost 2181 | grep imok"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ---------------------------------------------------------------------------
  # Apache Kafka – Event streaming for data ingestion pipeline
  # ---------------------------------------------------------------------------
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: kafka_cw
    restart: unless-stopped
    depends_on:
      zookeeper:
        condition: service_healthy
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    ports:
      - "9092:9092"
    volumes:
      - kafkadata:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092"]
      interval: 10s
      timeout: 10s
      retries: 10

  # ---------------------------------------------------------------------------
  # PostgreSQL seed – Creates tables and loads company_static data
  # ---------------------------------------------------------------------------
  postgres_seed:
    image: postgres:16-alpine
    container_name: postgres_seed_cw
    depends_on:
      postgres_db:
        condition: service_healthy
    environment:
      PGPASSWORD: postgres
    volumes:
      - ./static/schema/create_tables.sql:/seed/create_tables.sql:ro
      - ./static/schema/company_static.csv:/seed/company_static.csv:ro
      - ./static/schema/seed.sh:/seed/seed.sh:ro
    entrypoint: ["sh", "/seed/seed.sh"]
    restart: "no"

  # ---------------------------------------------------------------------------
  # pgAdmin – PostgreSQL GUI management
  # ---------------------------------------------------------------------------
  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin_cw
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: root
    ports:
      - "5051:80"

volumes:
  pgdata:
  mongodata:
  miniodata:
  zkdata:
  kafkadata:

name: CW2 CI

on:
  push:
    branches: [main, feature/**]
  pull_request:
    branches: [main]

jobs:
  lint-test-security:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        working-directory: team_kolmogorov/coursework_two
        run: |
          python -m pip install --upgrade pip
          pip install numpy pandas scipy scikit-learn statsmodels matplotlib \
                      seaborn pyarrow sqlalchemy psycopg2-binary pyyaml \
                      pydantic rich joblib pandas-market-calendars plotly \
                      nbformat ipykernel
          pip install pytest pytest-cov pytest-mock \
                      black isort flake8 sphinx pydata-sphinx-theme \
                      bandit pip-audit

      - name: Lint (flake8)
        working-directory: team_kolmogorov/coursework_two
        run: flake8 engine analytics --max-line-length=110 --extend-ignore=W293,E203,E221

      - name: Format check (black)
        working-directory: team_kolmogorov/coursework_two
        run: black --check engine analytics Main.py

      - name: Import order (isort)
        working-directory: team_kolmogorov/coursework_two
        run: isort --check-only engine analytics Main.py

      - name: Unit tests + coverage
        working-directory: team_kolmogorov/coursework_two
        run: pytest test/ -m "not integration" --cov=engine --cov=analytics --cov-report=term

      - name: Security scan (bandit)
        working-directory: team_kolmogorov/coursework_two
        run: bandit -r engine analytics -c pyproject.toml

      - name: Vulnerability scan (pip-audit)
        working-directory: team_kolmogorov/coursework_two
        run: pip-audit --strict
